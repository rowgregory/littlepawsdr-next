<svg viewBox="0 0 240 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dachshund mascot">
  <defs>
    <linearGradient id="furGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9a6bb0"/>
      <stop offset="100%" stop-color="#7c4f96"/>
    </linearGradient>
    <linearGradient id="earGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c4f96"/>
      <stop offset="100%" stop-color="#5e3b73"/>
    </linearGradient>
    <linearGradient id="snoutGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b083c4"/>
      <stop offset="100%" stop-color="#9a6bb0"/>
    </linearGradient>
  </defs>

  <!-- ================= EARS (behind head) ================= -->
  <g id="ear-left" style="transform-origin: 70px 70px;">
    <path d="M78 58
             C 40 46, 14 78, 20 128
             C 24 162, 52 168, 72 150
             C 60 120, 62 84, 78 58 Z"
          fill="url(#earGrad)"/>
  </g>
  <g id="ear-right" style="transform-origin: 170px 70px;">
    <path d="M162 58
             C 200 46, 226 78, 220 128
             C 216 162, 188 168, 168 150
             C 180 120, 178 84, 162 58 Z"
          fill="url(#earGrad)"/>
  </g>

  <!-- ================= HEAD ================= -->
  <g id="head">
    <!-- skull / cheeks -->
    <path d="M120 40
             C 168 40, 190 78, 188 120
             C 186 168, 158 205, 120 205
             C 82 205, 54 168, 52 120
             C 50 78, 72 40, 120 40 Z"
          fill="url(#furGrad)"/>

    <!-- lighter muzzle area -->
    <ellipse id="muzzle" cx="120" cy="150" rx="46" ry="42" fill="url(#snoutGrad)"/>

    <!-- ================= EYES ================= -->
    <g id="eyes">
      <g id="eye-left">
        <ellipse cx="94" cy="112" rx="15" ry="16" fill="#2a1836"/>
        <circle cx="99" cy="107" r="4.5" fill="#ffffff"/>
      </g>
      <g id="eye-right">
        <ellipse cx="146" cy="112" rx="15" ry="16" fill="#2a1836"/>
        <circle cx="151" cy="107" r="4.5" fill="#ffffff"/>
      </g>
      <!-- eyelids for blinking (slide down over eyes) -->
      <rect id="lid-left" x="77" y="78" width="34" height="0" fill="url(#furGrad)"/>
      <rect id="lid-right" x="129" y="78" width="34" height="0" fill="url(#furGrad)"/>
    </g>

    <!-- brows -->
    <path d="M80 92 Q 94 84 108 90" fill="none" stroke="#5e3b73" stroke-width="4" stroke-linecap="round"/>
    <path d="M132 90 Q 146 84 160 92" fill="none" stroke="#5e3b73" stroke-width="4" stroke-linecap="round"/>

    <!-- ================= NOSE ================= -->
    <ellipse id="nose" cx="120" cy="140" rx="16" ry="12" fill="#2a1836"/>
    <ellipse cx="114" cy="136" rx="4" ry="3" fill="#5e3b73" opacity="0.7"/>

    <!-- ================= MOUTH (animatable) ================= -->
    <!-- philtrum line from nose down -->
    <line x1="120" y1="152" x2="120" y2="164" stroke="#5e3b73" stroke-width="3" stroke-linecap="round"/>
    <!-- the mouth group scales vertically to "talk" -->
    <g id="mouth" style="transform-origin: 120px 168px;">
      <path id="mouth-shape"
            d="M92 166
               Q 120 172, 148 166
               Q 148 190, 120 192
               Q 92 190, 92 166 Z"
            fill="#3a2148"/>
      <!-- tongue -->
      <path d="M108 180 Q 120 200, 132 180 Q 132 192, 120 194 Q 108 192, 108 180 Z"
            fill="#c98fb8"/>
    </g>
  </g>
</svg>
